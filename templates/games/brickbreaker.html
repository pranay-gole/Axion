<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick Breaker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='games/brickbreaker/style.css') }}">
</head>
<body>

  <!-- Exit Gate -->
  <a href="{{ url_for('dashboard') }}" class="exit-gate">
    <span class="exit-gate-icon">⮌</span>
    <span>Exit Gate</span>
  </a>

  <!-- Game Canvas -->
  <canvas id="brickCanvas"></canvas>

  <!-- Start Screen -->
  <div id="startScreen" class="overlay">
    <div class="mini-card">
      Press <span>S</span> to Start
    </div>
  </div>

  <!-- Pause Screen -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="mini-card">
      Press <span>P</span> to Resume
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="gameover-card">

      <h1 class="gameover-title">GAME OVER</h1>

      <p class="gameover-score">
        Score: <span id="finalScore">0</span>
      </p>

      <p class="gameover-high">
        High Score: <span id="finalHigh">0</span>
      </p>

      <div class="restart-btn">
        Press <span>R</span> to Restart
      </div>

    </div>
  </div>

  <!-- Game Script -->
  <script src="{{ url_for('static', filename='games/brickbreaker/script.js') }}"></script>

</body>
</html>
