<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Flip</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='games/memoryflip/style.css') }}">
</head>
<body>

  <!-- Exit Gate -->
  <a href="{{ url_for('dashboard') }}" class="exit-gate">
    <span class="exit-gate-icon">⮌</span>
    <span>Exit Gate</span>
  </a>
  
  <!-- Background Particles -->
  <canvas id="particles"></canvas>

  <!-- Mode Selection (Top Right) -->
  <div class="mode-select">
    <button id="singleBtn" class="mode-btn active">Single Player</button>
    <button id="multiBtn" class="mode-btn">Multiplayer</button>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">

    <div class="player active" id="p1">
      <span id="p1Name">
       <span id="p1Name">{{ session.username }}</span>
      </span>
      <strong id="p1Score">0</strong>
    </div>

    <div class="player" id="p2">
      <span id="p2Name">AI</span>
      <strong id="p2Score">0</strong>
    </div>

  </div>

  <!-- Game Board -->
  <div class="game-board" id="gameBoard"></div>

  <!-- Game Over Overlay -->
  <div id="overlay" class="overlay">
    <div class="message-box">
      <p id="winnerMessage"></p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='games/memoryflip/particles.js') }}"></script>
  <script src="{{ url_for('static', filename='games/memoryflip/script.js') }}"></script>
</body>
</html>
