<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Neon</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='games/flappy/style.css') }}">
</head>
<body>

  <!-- 🔥 Exit Gate Added -->
  <a href="{{ url_for('dashboard') }}" class="exit-gate">
    <span class="exit-gate-icon">⮌</span>
    <span>Exit Gate</span>
  </a>
  
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
      <div id="score">0</div>

      <div id="overlayText" class="center-overlay">
        Press S to Start
      </div>
      <div id="gameOverOverlay" class="game-over-overlay hidden">
        <div class="game-over-box">
          <h1>GAME OVER</h1>
          <p>Score: <span id="finalScore">0</span></p>
          <p class="restart-text">Press R to Restart</p>
        </div>
      </div>
          
      <audio id="bgMusic" loop>
        <source src="{{ url_for('static', filename='games/flappy/music.mp3') }}" type="audio/mpeg">
      </audio>
      <audio id="loseSound">
        <source src="{{ url_for('static', filename='games/flappy/lose.mp3') }}" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <script src="{{ url_for('static', filename='games/flappy/script.js') }}"></script>
</body>
</html>
