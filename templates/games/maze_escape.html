<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze Escape</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='games/maze_escape/style.css') }}">
</head>
<body>

  <!-- 🔥 Exit Gate Added -->
  <a href="{{ url_for('dashboard') }}" class="exit-gate">
    <span class="exit-gate-icon">⮌</span>
    <span>Exit Gate</span>
  </a>
  
  <canvas id="mazeCanvas"></canvas>
  
    <!-- START -->
  <div id="startScreen" class="overlay">
    <div class="overlay-box">
      Press <span>S</span> to Start
    </div>
  </div>

  <!-- PAUSE -->
  <div id="pauseScreen" class="overlay hidden">
    <div class="overlay-box">
      Press <span>P</span> to Resume
    </div>
  </div>

  <!-- LEVEL COMPLETE -->
  <div id="levelScreen" class="overlay hidden">
    <div class="overlay-box">
      Level Complete! Press <span>N</span> for Next Level
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="overlay-box">
      Press <span>R</span> to Restart
    </div>
  </div>

  <!-- WIN -->
  <div id="winScreen" class="overlay hidden">
    <div class="overlay-box">
      🎉 You Win! Press <span>R</span> to Restart
    </div>
  </div>

  <script src="{{ url_for('static', filename='games/maze_escape/script.js') }}"></script>
</body>
</html>
