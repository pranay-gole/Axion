<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard - Axion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
    body {
        background: #000; /* Pure black */
        font-family: 'Orbitron', sans-serif;
        color: white;
        margin: 0;
        position: relative;
    }

    h1 {
        margin-top: 30px;
        text-align: center;
        color: #00fff7;
    }

    .leaderboard {
    width: 90%;
    max-width: 850px;
    margin: 20px auto 0 auto; /* top margin reduced */
    }

    .row {
    display: grid;
    grid-template-columns: 80px 1fr 150px 120px;
    align-items: center;
    padding: 15px 20px;
    margin: 12px 0;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.6);
    box-shadow: 0 0 12px #00fff755;
    text-align: center;
    }
    
    .top1 { background: gold; color: black; }
    .top2 { background: silver; color: black; }
    .top3 { background: #cd7f32; color: black; }

    .rank { font-weight: bold; }

    /* NEW BACK BUTTON STYLE */
    .back-link {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 8px 18px;
        border-radius: 999px;
        border: 2px solid;
        text-decoration: none;
        background: rgba(0, 10, 25, 0.85);
        color: #00fff7;
        font-size: 18px;
        font-weight: bold;
        transition: 0.2s ease;
    }

</style>
</head>
<body>

<h1>Leaderboard 🏆 </h1>

<div class="leaderboard">
    {% for user in users %}
        <div class="row 
            {% if user.rank == 1 %}top1{% endif %}
            {% if user.rank == 2 %}top2{% endif %}
            {% if user.rank == 3 %}top3{% endif %}">
            
            <div class="rank">#{{ user.rank }}</div>
            <div>{{ user.username }}</div>
            <div>Level {{ user.level }}</div>
            <div>{{ user.exp }} XP</div>
        </div>
    {% endfor %}
</div>

<a href="{{ url_for('dashboard') }}" class="back-link">← Back</a>

</body>
</html>
